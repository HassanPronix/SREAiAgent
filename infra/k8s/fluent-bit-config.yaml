apiVersion: v1
kind: ConfigMap

metadata:
  name: fluent-bit-config


data:

  fluent-bit.conf: |

    [SERVICE]
        Flush 5
        Log_Level info


    [INPUT]
        Name tail
        Path /var/log/containers/*.log
        Parser docker
        Tag kube.*


    [OUTPUT]
        Name kafka
        Match *
        Brokers kafka:29092
        Topics logs