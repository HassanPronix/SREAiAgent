apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: devops-agent

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: devops-agent:latest

        imagePullPolicy: Never

        ports:
        - containerPort: 5000

        envFrom:
        - configMapRef:
            name: backend-config

        - secretRef:
            name: backend-secret